name: Feature request
description: Propose one coherent Atlas capability or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable conditions for completion.
    validations:
      required: true
  - type: textarea
    id: contracts
    attributes:
      label: Affected contracts and risks
      description: Mention scoring, configuration, reports, database or compatibility impact.
