version: "1"

# Pontua a confiabilidade da proveniência declarada, sem inferir qualidade
# quando a fonte está ausente ou desconhecida.
source_quality:
  missing_score: 0
  unknown_score: 50
  patterns:
    SEC EDGAR: 95
    Yahoo Finance: 80
    yahoo: 80

# A coleta ampla é mensal. Dados com até 7 dias são frescos; até 35 dias
# continuam aceitáveis, mas explicitamente abaixo do estado fresco.
freshness:
  fresh_days: 7
  acceptable_days: 35
  fresh_score: 100
  acceptable_score: 70
  stale_score: 0

# Ausência estrutural é diferente de falha de coleta: esses campos saem do
# denominador de cobertura e não contam como feature crítica ausente.
not_applicable_by_sector:
  Financial Services: [altman_z, current_ratio, current_liquidity]
  Banks: [altman_z, current_ratio, current_liquidity]
  Insurance: [altman_z, current_ratio, current_liquidity]
  Utilities: [altman_z]
  Biotechnology: [altman_z, f_score_annual, net_debt_ebitda]
  Software: [current_ratio, current_liquidity]
  Tobacco: [current_ratio, current_liquidity]
