confidence_gate:
  score_coverage_threshold: 60.0
  confidence_threshold: 60.0

distress:
  enabled: true
  # Herdado de config/deal_breakers.json -- distress substitui o
  # deal-breaker binário antigo, não uma variante nova. Fórmula de
  # altman_z é a clássica de 1968 (analytics/fundamentals.py::_compute_altman_z,
  # inclui componente de valor de mercado); 1.8 é o limite de zona de
  # distress dessa fórmula, não da variante Z''.
  altman_z_threshold: 1.8
  altman_z_exempt_sectors: ["Utilities", "Financial Services", "Banks", "Insurance"]
  # interest_coverage não existia no deal-breaker antigo; tratado com a
  # mesma isenção do altman_z por ser a mesma família de solvência.
  interest_coverage_threshold: 2.5
  interest_coverage_exempt_sectors: ["Utilities", "Financial Services", "Banks", "Insurance"]
  net_debt_ebitda_threshold: 4.0
  current_ratio_threshold: 1.0
  current_ratio_exempt_sectors: ["Software"]
  short_float_threshold: 20.0
  # Piso absoluto, independente do delta de fundamental_decay -- uma
  # posição travada num F-Score ruim nunca dispara o delta (nunca cai),
  # mas não deveria passar despercebida.
  f_score_floor: 4

valuation_stretch:
  enabled: true
  target_upside_threshold: -0.10

fundamental_decay:
  enabled: true
  f_score_drop_threshold: 2.0
  roic_drop_pct_threshold: 0.20

relative_decay:
  enabled: true
  percentile_threshold: 40.0

escalation:
  trim_at: 1
  sell_at: 2
  trim_fraction: 0.50
  distress_overrides_escalation: true
